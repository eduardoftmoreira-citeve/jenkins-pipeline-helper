# Compact reference schema for reviewers and editor tooling. Runtime validation
# lives in deploylib/model.py, so deployment does not depend on a schema package.
type: object
required: [project_name, services]
properties:
  project_name:
    type: string
  infrastructure:
    type: object
    additionalProperties:
      type: object
      required: [type]
      properties:
        type:
          enum: [mongo, redis]
        version:
          type: string
        image:
          type: string
  services:
    type: object
    additionalProperties:
      type: object
      required: [type, port]
      properties:
        type:
          enum: [node]
        port:
          type: integer
        dockerfile:
          type: string
        build_context:
          type: string
        depends_on:
          type: array
          items: {type: string}
        route:
          oneOf:
            - type: boolean
            - type: object
              properties:
                enabled: {type: boolean}
                inject_base_path: {type: boolean}
        health_check:
          type: object
