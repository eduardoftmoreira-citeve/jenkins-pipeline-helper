project_name: pps7

services:
  api:
    image: node:18
    port: 3000
    build_command: |
      npm install
      npm run build
    health_check:
      path: /health
      status_code: 200
    env:
      env: production
    depends_on:
      - database
      - cache
  
  database:
    type: mongo
    image: mongo:7-jammy
    data_volume: true

  cache:
    type: redis 
    image: redis:7
    data_volume: true