        connectTimeout: 60
        dockerHost:
          uri: "unix:///var/run/docker.sock"
        readTimeout: 60
      name: "docker-agents"
      templates:
      - connector: "attach"
        dockerTemplateBase:
          cpuPeriod: 0
          cpuQuota: 0
          image: "localhost:5000/python-agent:latest"
          mounts:
          - "type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock"
          - "type=bind,source=/usr/bin/docker,target=/usr/bin/docker,readonly=true"
          - "type=bind,source=/home/users/cgomes/nginx/locations,target=/home/users/cgomes/nginx/locations"
          - "type=bind,source=/home/emoreira/cicd-poc,target=/home/emoreira/cicd-poc"
          mountsString: |-
            type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock
            type=bind,source=/usr/bin/docker,target=/usr/bin/docker,readonly=true
            type=bind,source=/home/users/cgomes/nginx/locations,target=/home/users/cgomes/nginx/locations
            type=bind,source=/home/emoreira/cicd-poc,target=/home/emoreira/cicd-poc
          privileged: true
          user: "root"
        instanceCapStr: "3"
        labelString: "python-agent"
        name: "python-agent"
        pullStrategy: PULL_NEVER
        pullTimeout: 300
        remoteFs: "/home/jenkins"
        removeVolumes: true
