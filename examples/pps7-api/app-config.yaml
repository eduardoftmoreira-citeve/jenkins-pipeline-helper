# Application-owned configuration. Dockerfile, Node version and build behavior
# live in the application repository. The pipeline chooses this single file for
# every supported branch; there are no environment overlay files.
project_name: pps7-api

infrastructure:
  mongo:
    type: mongo
    version: "8"
  redis:
    type: redis
    version: "7"

services:
  api:
    type: node
    port: 3000
    dockerfile: Dockerfile
    build_context: .
    depends_on: [mongo, redis]
    env:
      NODE_ENV: development
      PORT: "3000"
    health_check:
      path: /health
      status_code: 200
      timeout: 60
    route:
      enabled: true
      # Set true only when the application reads BASE_PATH and serves correctly
      # below the Nginx route. It is never injected by default.
      inject_base_path: false
